<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Entry</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --bg: #DBCEC5;
  --surface: #034245;
  --surface-hi: #0B5257;
  --line: rgba(255,255,255,.14);
  --line-onbg: rgba(3,66,69,.22);
  --cyan: #4DD8E6;
  --cyan-dim: #2E8C99;
  --amber: #F0A868;
  --green: #4ECDA0;
  --red: #E8697A;
  --text: #F5F1EA;
  --text-mid: #B9CFC9;
  --text-dim: #7DA39D;
  --ink: #073B3D;
  --ink-mid: #2C4442;
  --ink-dim: #4A5D5A;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter','Segoe UI',sans-serif;
  min-height:100vh;
  padding:24px 16px 60px;
}
.wrap{max-width:820px;margin:0 auto;}
h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:24px;
  font-weight:700;
  color:var(--ink);
  margin:0 0 4px;
}
.sub{font-size:13px;color:var(--ink-dim);margin-bottom:26px;}

/* ---------- Login card ---------- */
.login-card{
  max-width:360px;
  margin:60px auto;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:16px;
  padding:28px;
}
.login-card h2{
  font-family:'Space Grotesk',sans-serif;
  font-size:19px;
  color:#fff;
  margin:0 0 6px;
}
.login-card p{font-size:12.5px;color:var(--text-dim);margin:0 0 20px;}
.login-card label{
  display:block;
  font-size:10.5px;
  color:var(--text-dim);
  font-family:'IBM Plex Mono',monospace;
  text-transform:uppercase;
  letter-spacing:.05em;
  margin-bottom:5px;
  margin-top:14px;
}
.login-card label:first-of-type{margin-top:0;}
.login-card input{
  width:100%;
  background:var(--surface-hi);
  border:1px solid var(--line);
  border-radius:8px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:14px;
  padding:10px 12px;
  outline:none;
}
.login-card input:focus{border-color:var(--cyan-dim);}
.login-card .err{color:var(--red);font-size:12px;margin-top:10px;display:none;}
.btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:12.5px;
  font-weight:600;
  padding:10px 16px;
  border-radius:8px;
  border:1px solid var(--line);
  background:var(--surface-hi);
  color:var(--text-mid);
  cursor:pointer;
  transition:.15s;
}
.btn:hover{border-color:var(--cyan-dim);color:var(--text);}
.btn.primary{background:var(--cyan);color:#04222b;border-color:var(--cyan);width:100%;margin-top:18px;padding:11px;}
.btn.primary:hover{opacity:.9;}

/* ---------- Entry app ---------- */
.hidden{display:none !important;}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
  padding-bottom:16px;
  border-bottom:1px solid var(--line-onbg);
}
.topbar .who{font-size:12px;color:var(--ink-dim);font-family:'IBM Plex Mono',monospace;}

.controls-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:14px;
  padding:18px 20px;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
}
.controls-card .fld{display:flex;align-items:center;gap:8px;}
.controls-card label{
  font-size:11px;
  color:var(--text-dim);
  font-family:'IBM Plex Mono',monospace;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.controls-card select{
  background:var(--surface-hi);
  border:1px solid var(--line);
  border-radius:7px;
  color:var(--cyan);
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;
  font-weight:600;
  padding:6px 10px;
  outline:none;
}
.controls-card .hint{font-size:11.5px;color:var(--text-dim);}

.entry-wrap{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:20px;
}
.entry-row{
  display:grid;
  grid-template-columns:1.4fr 1fr .7fr 1.4fr;
  gap:14px;
  align-items:center;
  padding:16px 20px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.entry-row:last-child{border-bottom:none;}
.entry-row.head{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--text-dim);
  background:var(--surface-hi);
  padding:12px 20px;
}
.e-goal{color:var(--text);font-weight:600;font-size:13.5px;}
.e-task-ro{color:var(--text-mid);font-size:12.5px;}
.entry-row input, .entry-row textarea{
  width:100%;
  background:var(--surface-hi);
  border:1px solid var(--line);
  border-radius:7px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:13px;
  padding:8px 10px;
  outline:none;
}
.entry-row input:focus, .entry-row textarea:focus{border-color:var(--cyan-dim);}
.entry-row input.progress-input{
  font-family:'IBM Plex Mono',monospace;
  font-weight:700;
  text-align:center;
}
.entry-row textarea{resize:vertical;min-height:38px;font-family:'Inter',sans-serif;}

.save-bar{display:flex;justify-content:flex-end;gap:10px;}
.empty-msg{
  text-align:center;
  padding:50px 20px;
  color:var(--ink-dim);
  font-size:13.5px;
}
@media (max-width:680px){
  .entry-row, .entry-row.head{grid-template-columns:1fr;gap:6px;}
  .entry-row.head{display:none;}
  .entry-row{padding:14px;}
  .e-goal{font-size:13px;}
}
</style>
</head>
<body>
<div class="wrap">

  <div id="loginView">
    <div class="login-card">
      <h2>Data Entry</h2>
      <p>Sign in with the account given to you to fill in progress updates.</p>
      <label>Email</label>
      <input type="email" id="email" autocomplete="username">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password">
      <button class="btn primary" id="loginBtn">Sign in</button>
      <div class="err" id="loginErr"></div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <div class="topbar">
      <div>
        <h1>Fill Progress</h1>
        <div class="sub">Update the % progress and comment for each goal's task — nothing else can be changed here.</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="who" id="whoLabel"></span>
        <button class="btn" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="controls-card" id="controlsCard">
      <span class="hint" id="whichLabel">Loading assigned Cycle &amp; Task…</span>
    </div>

    <div class="entry-wrap" id="entryWrap"></div>

    <div class="save-bar">
      <button class="btn primary" id="saveBtn" style="margin-top:0;width:auto;display:none;">Save Progress</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, setDoc, getDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCObXXRAlgfajndVIz8eDsSF--F3x8FJUU",
  authDomain: "pam-dashboard-2027.firebaseapp.com",
  projectId: "pam-dashboard-2027",
  storageBucket: "pam-dashboard-2027.firebasestorage.app",
  messagingSenderId: "533576693120",
  appId: "1:533576693120:web:1284a23ef199bfa0917d65"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentCycleId = null;
let currentGoals = [];
let unsubscribeCycle = null;

// ---------------- Auth ----------------
document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  try{
    await signInWithEmailAndPassword(auth, email, pw);
  }catch(err){
    errEl.textContent = 'Sign-in failed — check your email and password.';
    errEl.style.display = 'block';
  }
});
document.getElementById('logoutBtn').addEventListener('click', ()=> signOut(auth));

onAuthStateChanged(auth, (user)=>{
  if(user){
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('appView').classList.remove('hidden');
    document.getElementById('whoLabel').textContent = user.email || '';
    loadFixedView();
  } else {
    document.getElementById('appView').classList.add('hidden');
    document.getElementById('loginView').classList.remove('hidden');
    if(unsubscribeCycle){ unsubscribeCycle(); unsubscribeCycle = null; }
  }
});

// ---------------- Fixed Cycle/Task (set by the admin, no picker shown here) ----------------
let fixedTaskN = 1;

async function loadFixedView(){
  const label = document.getElementById('whichLabel');
  const saveBtn = document.getElementById('saveBtn');
  try{
    const snap = await getDoc(doc(db,'settings','entryDefault'));
    if(!snap.exists()){
      label.textContent = 'No Cycle/Task has been assigned yet — ask the admin to set it.';
      document.getElementById('entryWrap').innerHTML = '';
      saveBtn.style.display = 'none';
      return;
    }
    const data = snap.data();
    currentCycleId = data.cycle ? String(data.cycle) : null;
    fixedTaskN = data.sprint || 1;
    if(!currentCycleId){
      label.textContent = 'No Cycle/Task has been assigned yet — ask the admin to set it.';
      saveBtn.style.display = 'none';
      return;
    }
    label.innerHTML = `Cycle <b style="color:var(--ink)">${currentCycleId}</b> &nbsp;·&nbsp; Task <b style="color:var(--ink)">${fixedTaskN}</b>`;
    saveBtn.style.display = 'inline-block';
    subscribeToCycle(currentCycleId);
  }catch(err){
    label.textContent = 'Could not load assignment: ' + err.message;
    saveBtn.style.display = 'none';
  }
}

function subscribeToCycle(cycleId){
  if(unsubscribeCycle) unsubscribeCycle();
  const ref = doc(db,'cycles',cycleId);
  unsubscribeCycle = onSnapshot(ref, (snap)=>{
    currentGoals = snap.exists() ? (snap.data().goals || []) : [];
    renderEntryTable();
  }, (err)=>{
    console.error('Firestore listen error', err);
  });
}

// ---------------- Entry table ----------------
function getTaskNumber(){
  return fixedTaskN;
}

function renderEntryTable(){
  const wrap = document.getElementById('entryWrap');
  if(!currentCycleId || currentGoals.length === 0){
    wrap.innerHTML = `<div class="empty-msg">No goals available for this cycle yet.</div>`;
    return;
  }
  const idx = getTaskNumber() - 1;
  let html = `<div class="entry-row head"><span>Goal</span><span>Task</span><span>Progress %</span><span>Comment</span></div>`;
  currentGoals.forEach(g=>{
    const t = (g.tasks && g.tasks[idx]) ? g.tasks[idx] : { name:'', progress:null, note:'' };
    const progVal = (t.progress===null || t.progress===undefined) ? '' : t.progress;
    html += `<div class="entry-row" data-goalno="${g.no}">
      <div class="e-goal">${g.name}</div>
      <div class="e-task-ro">${t.name ? t.name : '<span style="color:var(--text-dim)">(no task set)</span>'}</div>
      <input type="number" min="0" max="100" class="progress-input" value="${progVal}" placeholder="—">
      <textarea placeholder="Comment / justification (optional)">${t.note || ''}</textarea>
    </div>`;
  });
  wrap.innerHTML = html;
}

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  if(!currentCycleId){ alert('No cycle selected.'); return; }
  const taskN = getTaskNumber();
  const idx = taskN - 1;
  document.querySelectorAll('#entryWrap .entry-row[data-goalno]').forEach(row=>{
    const no = Number(row.getAttribute('data-goalno'));
    const g = currentGoals.find(x=>x.no===no);
    if(!g) return;
    if(!g.tasks) g.tasks = [];
    while(g.tasks.length <= idx) g.tasks.push({ id:`${g.no}.${g.tasks.length+1})`, name:'', progress:null, note:'' });
    const progRaw = row.querySelector('.progress-input').value.trim();
    const noteVal = row.querySelector('textarea').value.trim();
    // Only progress + comment are ever changed — name/id stay exactly as they are.
    g.tasks[idx] = {
      ...g.tasks[idx],
      progress: progRaw==='' ? null : Math.max(0, Math.min(100, parseInt(progRaw,10))),
      note: noteVal
    };
  });
  try{
    await setDoc(doc(db,'cycles',currentCycleId), { goals: currentGoals });
    alert(`Saved Task ${taskN} progress for Cycle ${currentCycleId}.`);
  }catch(err){
    alert('Save failed:\n' + err.message);
  }
});
</script>
</body>
</html>
