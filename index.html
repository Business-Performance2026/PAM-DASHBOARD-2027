<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goals Execution Progress</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --bg: #0A1F2E;
  --bg-grid: rgba(77,216,230,0.045);
  --surface: #10283A;
  --surface-hi: #17324A;
  --line: #1F4258;
  --cyan: #4DD8E6;
  --cyan-dim: #2E8C99;
  --amber: #F0A868;
  --green: #4ECDA0;
  --red: #E8697A;
  --text: #E9F3F6;
  --text-mid: #9CC0D1;
  --text-dim: #5E8296;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    linear-gradient(var(--bg-grid) 1px, transparent 1px) 0 0/44px 44px,
    linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px) 0 0/44px 44px,
    var(--bg);
  color:var(--text);
  font-family:'Inter','Segoe UI',sans-serif;
  min-height:100vh;
  padding:28px 20px 60px;
}

.wrap{max-width:1100px;margin:0 auto;}

/* ---------- Admin bar ---------- */
.adminbar{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11.5px;
  color:var(--text-dim);
}
.adminbar .adm-label{letter-spacing:.08em;text-transform:uppercase;}
.adminbar input{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:7px;
  color:var(--cyan);
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;
  font-weight:600;
  width:56px;
  padding:5px 8px;
  text-align:center;
  outline:none;
}
.adminbar input:focus{border-color:var(--cyan-dim);}
.adminbar .hint{color:var(--text-dim);font-style:normal;}

/* ---------- Header ---------- */
header{
  border-bottom:1px solid var(--line);
  padding-bottom:22px;
  margin-bottom:26px;
}
.eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  letter-spacing:.14em;
  color:var(--cyan);
  text-transform:uppercase;
  margin-bottom:8px;
}
h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:34px;
  font-weight:700;
  margin:0;
  color:#fff;
  letter-spacing:-.01em;
}
h1 .sprint-num{color:var(--cyan);}

/* ---------- Stat strip ---------- */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:26px;
}
.stat{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:12px;
  padding:16px 18px;
  position:relative;
  overflow:hidden;
}
.stat::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(77,216,230,.06), transparent 60%);
  pointer-events:none;
}
.stat .num{
  font-family:'Space Grotesk',sans-serif;
  font-size:30px;
  font-weight:700;
  color:#fff;
  line-height:1;
}
.stat .lbl{
  font-size:12.5px;
  color:var(--text-mid);
  margin-top:8px;
}
.stat.complete .num{color:var(--green);}
.stat.delayed .num{color:var(--amber);}
.stat.avg .num{color:var(--cyan);}

/* ---------- Filters ---------- */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  margin-bottom:22px;
}
.controls .label{
  font-size:12.5px;
  color:var(--text-dim);
  font-family:'IBM Plex Mono',monospace;
  margin-right:4px;
}
.seg{
  display:flex;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:10px;
  padding:3px;
  gap:2px;
}
.seg button{
  border:none;
  background:transparent;
  color:var(--text-mid);
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  padding:8px 14px;
  border-radius:7px;
  cursor:pointer;
  transition:.15s;
  white-space:nowrap;
}
.seg button:hover{color:var(--text);}
.seg button.active{
  background:var(--cyan);
  color:#04222b;
}
.search{
  flex:1;
  min-width:180px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:10px;
  padding:9px 14px;
  color:var(--text);
  font-family:inherit;
  font-size:13.5px;
  outline:none;
}
.search::placeholder{color:var(--text-dim);}
.search:focus{border-color:var(--cyan-dim);}

/* ---------- Goal Cards ---------- */
.goal{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:14px;
  margin-bottom:12px;
  overflow:hidden;
  transition:border-color .15s;
}
.goal:hover{border-color:var(--cyan-dim);}

.goal-head{
  display:flex;
  align-items:center;
  gap:16px;
  padding:16px 18px;
}
.gauge{
  width:6px;
  align-self:stretch;
  min-height:44px;
  border-radius:4px;
  background:var(--line);
  position:relative;
  overflow:hidden;
  flex-shrink:0;
}
.gauge-fill{
  position:absolute;
  bottom:0;left:0;right:0;
  border-radius:4px;
  transition:height .4s ease;
}
.goal-num{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--text-dim);
  width:24px;
  flex-shrink:0;
}
.goal-title-wrap{flex:1;min-width:0;}
.goal-title{
  font-size:15.5px;
  font-weight:600;
  color:var(--text);
  margin-bottom:4px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.goal-tags{
  display:flex;gap:6px;flex-wrap:wrap;
}
.tag{
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;
  padding:2px 8px;
  border-radius:20px;
  border:1px solid var(--line);
  color:var(--text-mid);
}
.tag.dep{color:var(--cyan);border-color:rgba(77,216,230,.3);}
.tag.taskcount{color:var(--text-dim);}

.goal-avg{
  text-align:right;
  flex-shrink:0;
}
.goal-avg .pct{
  font-family:'IBM Plex Mono',monospace;
  font-size:20px;
  font-weight:600;
  line-height:1;
}
.goal-avg .pctlbl{
  font-size:10.5px;
  color:var(--text-dim);
  margin-top:3px;
}
.chevron{
  color:var(--text-dim);
  transition:transform .2s;
  flex-shrink:0;
}
.goal.open .chevron{transform:rotate(180deg);}

.status-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}

/* ---------- Tasks table ---------- */
.tasks{
  border-top:1px solid var(--line);
  padding:6px 18px 16px;
}

.task-row{
  display:grid;
  grid-template-columns:36px 1fr 110px 140px 100px;
  gap:12px;
  align-items:center;
  padding:11px 6px;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.task-row:last-child{border-bottom:none;}
.task-head-row{
  display:grid;
  grid-template-columns:36px 1fr 110px 140px 100px;
  gap:12px;
  padding:8px 6px 6px;
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;
  color:var(--text-dim);
  text-transform:uppercase;
  letter-spacing:.06em;
}
.t-id{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);}
.t-name{font-size:13.5px;color:var(--text);line-height:1.5;}
.t-dep{
  font-size:11px;
  color:var(--text-mid);
  font-family:'IBM Plex Mono',monospace;
}
.t-progress{display:flex;align-items:center;gap:8px;}
.bar{
  flex:1;height:6px;background:var(--line);border-radius:4px;overflow:hidden;
}
.bar-fill{height:100%;border-radius:4px;}
.t-pct{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  font-weight:600;
  width:34px;
  text-align:right;
  flex-shrink:0;
}
.t-status{
  font-size:10.5px;
  font-family:'IBM Plex Mono',monospace;
  padding:3px 9px;
  border-radius:20px;
  text-align:center;
  white-space:nowrap;
}
.t-status.complete{background:rgba(78,205,160,.12);color:var(--green);}
.t-status.delayed{background:rgba(240,168,104,.14);color:var(--amber);}
.t-status.transferred{background:rgba(255,255,255,.06);color:var(--text-dim);}

.justif{
  grid-column:1 / -1;
  margin-top:8px;
  background:rgba(240,168,104,.07);
  border-left:3px solid var(--amber);
  border-radius:6px;
  padding:10px 14px;
  font-size:12.5px;
  color:#EFC79A;
  line-height:1.7;
}
.justif b{color:var(--amber);font-family:'IBM Plex Mono',monospace;font-size:10.5px;display:block;margin-bottom:4px;letter-spacing:.05em;}

.empty{
  text-align:center;
  padding:60px 20px;
  color:var(--text-dim);
  font-size:14px;
}
.no-task{
  padding:14px 6px;
  color:var(--text-dim);
  font-size:12.5px;
  font-style:italic;
}

@media (max-width:720px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .task-row,.task-head-row{grid-template-columns:24px 1fr 90px;}
  .t-dep{display:none;}
  .task-head-row span:nth-child(4){display:none;}
}
</style>
</head>

// ---------- helpers ----------
function statusColor(p){
  if(p===null) return 'var(--text-dim)';
  if(p===100) return 'var(--green)';
  if(p>=70) return 'var(--amber)';
  return 'var(--red)';
}
function taskStatus(t){
  if(t.progress===null) return 'transferred';
  return t.progress===100 ? 'complete' : 'delayed';
}
function goalStatus(g){
  return g.avg>=100 ? 'complete' : 'delayed';
}

// ---------- sprint number (admin controlled, single source of truth) ----------
// Sprint N maps to the Nth task (1-based) inside every Goal's task list. Capped at 6.
function getSprintNumber(){
  let n = parseInt(document.getElementById('sprintInput').value, 10);
  if(isNaN(n) || n < 1) n = 1;
  if(n > 6) n = 6;
  document.getElementById('sprintInput').value = n;
  return n;
}
function renderSprintLabel(){
  document.getElementById('sprintTitleNum').textContent = 'Sprint ' + getSprintNumber();
}
document.getElementById('sprintInput').addEventListener('input', ()=>{
  renderSprintLabel();
  renderGoals();
});

// ---------- cycle number (admin controlled) ----------
function getCycleNumber(){
  const n = parseInt(document.getElementById('cycleInput').value, 10);
  return isNaN(n) ? null : n;
}
function getCurrentCycleData(){
  const c = getCycleNumber();
  return CYCLES[c] || [];
}
document.getElementById('cycleInput').addEventListener('input', ()=>{
  renderStats();
  renderGoals();
});

// ---------- render stats ----------
function renderStats(){
  const data = getCurrentCycleData();
  const total = data.length;
  const completeGoals = data.filter(g=>g.avg>=100).length;
  const delayedGoals = total - completeGoals;
  const overallAvg = total ? (data.reduce((s,g)=>s+g.avg,0)/total).toFixed(1) : '—';
  const el = document.getElementById('statStrip');
  el.innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="lbl">Total Goals</div></div>
    <div class="stat complete"><div class="num">${completeGoals}</div><div class="lbl">Goals at 100%</div></div>
    <div class="stat delayed"><div class="num">${delayedGoals}</div><div class="lbl">Goals with Delays</div></div>
    <div class="stat avg"><div class="num">${overallAvg}${total? '%':''}</div><div class="lbl">Overall Average</div></div>
  `;
}

// ---------- render goals ----------
let currentFilter = 'all';
let currentSearch = '';

function renderGoals(){
  const list = document.getElementById('goalsList');
  const empty = document.getElementById('emptyState');
  list.innerHTML='';

  const DATA = getCurrentCycleData();

  if(DATA.length === 0){
    empty.style.display = 'block';
    empty.textContent = `No data uploaded yet for Cycle ${getCycleNumber() ?? '—'}. Send me the updated file (or type out the changes) and I'll add it.`;
    return;
  }
  empty.textContent = 'No results match the current filter or search.';

  const sprintN = getSprintNumber();
  const upTo = g => g.tasks.slice(0, sprintN); // tasks 1..N for this goal

  const filtered = DATA.filter(g=>{
    const visible = upTo(g);
    const latest = visible[visible.length-1];
    if(currentFilter==='complete' && (!latest || taskStatus(latest)!=='complete')) return false;
    if(currentFilter==='delayed' && (!latest || taskStatus(latest)!=='delayed')) return false;
    if(currentSearch){
      const q = currentSearch.toLowerCase();
      const inTitle = g.name.toLowerCase().includes(q);
      const inTask = visible.some(t=>t.name.toLowerCase().includes(q));
      if(!inTitle && !inTask) return false;
    }
    return true;
  });

  empty.style.display = filtered.length ? 'none':'block';

  filtered.forEach(g=>{
    const visible = upTo(g);
    const latest = visible[visible.length-1];
    const tStatus = latest ? taskStatus(latest) : 'transferred';
    const dotColor = tStatus==='complete' ? 'var(--green)' : tStatus==='delayed' ? 'var(--amber)' : 'var(--text-dim)';
    const avgColor = goalStatus(g)==='complete' ? 'var(--green)' : 'var(--amber)';

    const card = document.createElement('div');
    card.className = 'goal';
    card.innerHTML = `
      <div class="goal-head" data-goal="${g.no}">
        <div class="gauge"><div class="gauge-fill" style="height:${g.avg}%;background:${avgColor}"></div></div>
        <div class="goal-num">${String(g.no).padStart(2,'0')}</div>
        <div class="status-dot" style="background:${dotColor}"></div>
        <div class="goal-title-wrap">
          <div class="goal-title">${g.name}</div>
          <div class="goal-tags">
            <span class="tag dep">${g.dependency}</span>
            <span class="tag taskcount">${visible.length} of ${g.tasks.length} tasks shown</span>
          </div>
        </div>
        <div class="goal-avg">
          <div class="pct" style="color:${avgColor}">${g.avg}%</div>
          <div class="pctlbl">Average %</div>
        </div>
      </div>
      <div class="tasks">
        <div class="task-head-row">
          <span>#</span><span>Task</span><span>Dependencies</span><span>Progress (%)</span><span>Status</span>
        </div>
        ${ visible.length === 0
          ? `<div class="no-task">No task at this position for this Goal.</div>`
          : visible.map(t=>{
              const st = taskStatus(t);
              const stLabel = st==='complete' ? 'Complete' : st==='delayed' ? 'Delayed' : 'Moved to O&M';
              const barColor = statusColor(t.progress);
              const pctLabel = t.progress===null ? '—' : t.progress+'%';
              return `
              <div class="task-row">
                <div class="t-id">${t.id}</div>
                <div class="t-name">${t.name}</div>
                <div class="t-dep">${g.dependency}</div>
                <div class="t-progress">
                  <div class="bar"><div class="bar-fill" style="width:${t.progress||0}%;background:${barColor}"></div></div>
                  <div class="t-pct" style="color:${barColor}">${pctLabel}</div>
                </div>
                <div class="t-status ${st}">${stLabel}</div>
                ${t.note ? `<div class="justif"><b>Justification of Delay</b>${t.note}</div>` : ''}
              </div>`;
            }).join('')
        }
      </div>
    `;
    list.appendChild(card);
  });
}

document.getElementById('filterSeg').addEventListener('click', (e)=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  document.querySelectorAll('#filterSeg button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.getAttribute('data-f');
  renderGoals();
});

document.getElementById('search').addEventListener('input', (e)=>{
  currentSearch = e.target.value.trim();
  renderGoals();
});

renderSprintLabel();
renderStats();
renderGoals();
</script>
</body>
</html>
